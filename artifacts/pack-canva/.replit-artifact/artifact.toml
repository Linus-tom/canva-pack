kind = "web"
previewPath = "/"
title = "Pack de artes canva"
version = "1.0.0"
id = "artifacts/pack-canva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18122

[services.development]
run = "pnpm --filter @workspace/pack-canva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pack-canva", "run", "build" ]
publicDir = "artifacts/pack-canva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18122"
BASE_PATH = "/"
