name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build canva-boss
        working-directory: artifacts/canva-boss
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiKey: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: 317b22b3fec9c91bcda434fb6ca778dd
          command: pages deploy artifacts/canva-boss/dist/public --project-name=project-clone-master --branch=main
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
